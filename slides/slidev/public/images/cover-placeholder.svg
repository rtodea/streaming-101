<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <rect width="600" height="800" fill="#f5f5f5"/>

  <!-- Waveform bars — streaming/audio visual metaphor -->
  <g transform="translate(300, 400)" stroke="#111" stroke-width="4" stroke-linecap="round">
    <line x1="-180" y1="60" x2="-180" y2="-60"/>
    <line x1="-150" y1="100" x2="-150" y2="-100"/>
    <line x1="-120" y1="140" x2="-120" y2="-140"/>
    <line x1="-90" y1="80" x2="-90" y2="-80"/>
    <line x1="-60" y1="180" x2="-60" y2="-180"/>
    <line x1="-30" y1="120" x2="-30" y2="-120"/>
    <line x1="0" y1="200" x2="0" y2="-200"/>
    <line x1="30" y1="140" x2="30" y2="-140"/>
    <line x1="60" y1="160" x2="60" y2="-160"/>
    <line x1="90" y1="90" x2="90" y2="-90"/>
    <line x1="120" y1="120" x2="120" y2="-120"/>
    <line x1="150" y1="70" x2="150" y2="-70"/>
    <line x1="180" y1="40" x2="180" y2="-40"/>
  </g>

  <!-- Play triangle overlay -->
  <g transform="translate(300, 400)" opacity="0.15">
    <polygon points="-40,-50 -40,50 50,0" fill="#111"/>
  </g>
</svg>
