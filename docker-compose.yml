services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://server:3000
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  server:
    build: ./server
    command: npm run start:dev
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
      - hls-data:/data/hls
    environment:
      - PORT=3000
      - HLS_OUTPUT_DIR=/data/hls
      - HLS_SEGMENT_DURATION=4
      - MAX_UPLOAD_SIZE=524288000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  hls-data:
